shadow = true;
shadow-radius = 7;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.60;

fading = true;
fade-delta = 7.0;
fade-in-step = 0.1;
fade-out-step = 0.1;

corner-radius = 8;

# blur-background = true;
# blur-method = "dual_kawase";

#blur-background = false;

vsync = true;
backend = "glx";
#backend = "xrender";
xrender-sync-fense = true;

mark-wmwin-focused = false;
use-ewmh-active-win = true;
unredir-if-possible = true;
mark-ovredir-focused = true;
detect-rounded-corners = false;
detect-client-opacity = true;
use-damage = false;

active-opacity = 1;
inactive-opacity = 0.8;

opacity-rule = [
"100:class_g *= 'LibreWolf' && focused",
"100:class_g *= 'Element' && focused",
"100:class_g *= 'Gimp' && focused",
"100:class_g *= 'feh' && focused",
"100:class_g *= 'Rofi'",
"95:class_g *= 'Polybar'",

"80:class_g = 'code-oss' && !focused",
"97:class_g = 'code-oss' && focused",

"100:class_g = 'Thorium-browser' && !focused",
"100:class_g = 'Thorium-browser' && focused",

 "70:class_g = 'Alacritty' && !focused",
 "80:class_g = 'Alacritty' && focused",

 "80:class_g = 'kitty' && !focused",
 "96:class_g = 'kitty' && focused",

 "80:class_g = 'mpv' && !focused",
 "100:class_g = 'mpv' && focused",

 "80:class_g = 'qbittorrent' && !focused",
 "100:class_g = 'qbittorrent' && focused",
 
 "80:class_g = 'discord' && !focused",
 "100:class_g = 'discord' && focused",

 "80:class_g = 'Cursor' && !focused",
 "96:class_g = 'Cursor' && focused",

 "100:name='*mpv' && !focused",
 "100:name='*mpv' && focused",

 "100:class_g = 'Brave-browser' && !focused",
 "100:class_g = 'Brave-browser' && focused",
];

focus-exclude = [
    "class_g = 'mpkv'",
];
 
shadow-exclude = [
	"! name~=''",
	"name = 'Notification'",
	"class_g ?= 'Notify-osd'",
	"_GTK_FRAME_EXTENTS@:c",
	"_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
	"class_g = 'Dunst'",
  "class_g = 'Eww'",
  "class_g = 'eww'"
];

blur-background-exclude = [
  "window_type = 'dock'",
  "class_g ~= 'slop'",
  "class_i ~= 'slop'",
  "name ~= 'slop'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

rounded-corners-exclude = [
	"class_g = 'Tint2'",
	"class_g = 'Polybar'",
	"class_g = 'Rofi'",
	"class_g = 'copyq'",
  	"class_g = 'Eww'",
	"class_g = 'slop'"
];

wintypes:
{
	tooltip = { fade = true; shadow = false; focus = true; };
	dropdown_menu = { fade = true; shadow = false; focus = true; };
	popup_menu = { fade = true; shadow = false; focus = true; };
	utility = { fade = true; shadow = false; focus = true; };
	dock = { shadow = false; };
	dnd = { shadow = false; };
};
