[global]
    ### Geometry & Corners ###
    # Make the notification a perfectly flat block
    corner_radius = 0
    frame_width = 0
    separator_height = 0

    ### Margins & Padding ###
    # Add breathing room without borders
    padding = 10
    horizontal_padding = 10
    indicate_hidden = yes

[urgency_low]
    # Use solid flat colors for background and text
    background = "#2e3440"
    foreground = "#d8dee9"
    timeout = 5

[urgency_normal]
    background = "#3b4252"
    foreground = "#d8dee9"
    timeout = 10

[urgency_critical]
    # Bright contrasting color for critical alerts (e.g., solid red)
    background = "#bf616a"
    foreground = "#eceff4"
    timeout = 0

